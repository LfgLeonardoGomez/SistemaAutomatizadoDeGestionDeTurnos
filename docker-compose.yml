services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: turnos
      POSTGRES_PASSWORD: turnos
      POSTGRES_DB: turnos
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turnos -d turnos"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "18000:8000"
    environment:
      # Base de datos
      DATABASE_URL: postgresql+asyncpg://turnos:turnos@db:5432/turnos

      # Tests (opcional, vacio en runtime; usado por la suite de pytest
      # cuando se quiere apuntar a un PG pre-instalado en lugar de
      # levantar un contenedor con testcontainers).
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:-}

      # Aplicacion / entorno
      ENV: ${ENV:-development}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}

      # Google Calendar
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALENDAR_MAX_RETRIES: ${GOOGLE_CALENDAR_MAX_RETRIES:-3}
      GOOGLE_CALENDAR_BASE_DELAY: ${GOOGLE_CALENDAR_BASE_DELAY:-1.0}
      GOOGLE_CALENDAR_MAX_DELAY: ${GOOGLE_CALENDAR_MAX_DELAY:-10.0}

      # Scheduler / reservas / recordatorios
      RESERVA_TEMPORAL_MINUTOS: ${RESERVA_TEMPORAL_MINUTOS:-10}
      LISTA_ESPERA_MINUTOS: ${LISTA_ESPERA_MINUTOS:-5}
      RECORDATORIO_HORAS_ANTES: ${RECORDATORIO_HORAS_ANTES:-24}
      RECORDATORIO_JOB_INTERVAL_MINUTOS: ${RECORDATORIO_JOB_INTERVAL_MINUTOS:-60}
      COMPLETADO_JOB_INTERVAL_MINUTOS: ${COMPLETADO_JOB_INTERVAL_MINUTOS:-5}

      # Seed / bootstrap
      SEED_DEFAULT_PASSWORD: ${SEED_DEFAULT_PASSWORD:-}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # --- Integracion con el backend ---
      # OJO: se llama por NOMBRE de servicio (backend) y puerto INTERNO (8000),
      # NO por localhost:18000. Dentro de la red de Compose cada contenedor
      # tiene su propio localhost; los servicios se hablan por su nombre.
      FASTAPI_BASE_URL: http://backend:8000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}

      # Permite acceder a $env en expresiones de nodos. Necesario para el nodo
      # HTTP que envia teclados dinamicos a Telegram (el token va en la URL, y
      # la imagen n8n:latest bloquea el acceso a env por default).
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"

      # --- URL publica (ngrok) que n8n usa para registrar los webhooks ---
      # Unica fuente de verdad: NGROK_DOMAIN (ej. tu-nombre.ngrok-free.app).
      # n8n construye las URLs de webhook con esto, ngrok expone el mismo dominio.
      WEBHOOK_URL: https://${NGROK_DOMAIN}

      # --- Zona horaria para los nodos Schedule (recordatorios C-10) ---
      GENERIC_TIMEZONE: America/Argentina/Buenos_Aires
      TZ: America/Argentina/Buenos_Aires

      # NOTA: n8n 1.0+ ignora N8N_BASIC_AUTH_*. La primera vez que entres a
      # la UI te va a pedir crear una cuenta "owner". Es el flujo nuevo.
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - backend
    profiles:
      - n8n

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    # Expone el n8n interno (n8n:5678) en tu dominio estatico de ngrok.
    # El dominio debe coincidir con NGROK_DOMAIN usado por WEBHOOK_URL arriba.
    command: http n8n:5678 --domain=${NGROK_DOMAIN}
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?NGROK_AUTHTOKEN es requerido (lo sacas de dashboard.ngrok.com)}
    ports:
      - "4040:4040"  # UI de inspeccion de trafico: http://localhost:4040
    depends_on:
      - n8n
    profiles:
      - n8n

volumes:
  postgres_data:
  n8n_data:
