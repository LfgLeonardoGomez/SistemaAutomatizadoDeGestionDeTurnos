services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: turnos
      POSTGRES_PASSWORD: turnos
      POSTGRES_DB: turnos
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turnos -d turnos"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "18000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://turnos:turnos@db:5432/turnos
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      RESERVA_TEMPORAL_MINUTOS: ${RESERVA_TEMPORAL_MINUTOS:-10}
      RECORDATORIO_HORAS_ANTES: ${RECORDATORIO_HORAS_ANTES:-24}
      ENV: ${ENV:-development}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-admin}
    volumes:
      - n8n_data:/home/node/.n8n
    profiles:
      - n8n

volumes:
  postgres_data:
  n8n_data:
